
<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .main-image {
            display: block;
            width:200px;
            height:200px;
            margin-left: auto;
            margin-right: auto;
            width: 50%;
        }

        .img{
            width:500px;
            height:500px;
        }
        .oi{
            display:grid;
            grid-template-columns: 1fr 1fr 1fr ;
            grid-template-rows: 1fr;
        }



        .disclaimer {
            position:relative;
            top:80px;
            margin: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
            font-size: 10px;
        }
        .disclaimer ul{color:rgb(245, 92, 92);}
        .oisnap{
            width:200px;
            height:200px;
            position:relative;
            top:50px;
            left:200px;
            border-radius: 50%;
            border:2px solid rgb(0,130,65);
        }
    </style>

</head>
<body>
    
    <img class="main-image" src="/sprites/main.PNG" alt="Main Image">
    <h2 align="center">2026-02-24 Analysis</h2>
    <div class="oi">
        <img class="img" src="/sprites/oldbhav.png" alt="OI1 Image">
        <img class="img" src="/sprites/oldbhav_ce.png" alt="OI2 Image">
        <img class="img" src="/sprites/oldbhav_pe.png" alt="OI3 Image">
    </div>
    <h2 align="center">2026-03-30 Analysis</h2>
    <div class="oi">
        <img class="img" src="/sprites/midbhav.png" alt="OI1 Image">
        <img class="img" src="/sprites/midbhav_ce.png" alt="OI2 Image">
        <img class="img" src="/sprites/midbhav_pe.png" alt="OI3 Image">
    </div>
    <h2 align="center">2026-04-28 Analysis</h2>
    <div class="oi">
        <img class="img" src="/sprites/newbhav.png" alt="OI1 Image">
        <img class="img" src="/sprites/newbhav_ce.png" alt="OI2 Image">
        <img class="img" src="/sprites/newbhav_pe.png" alt="OI3 Image">
    </div></body>
</html>
